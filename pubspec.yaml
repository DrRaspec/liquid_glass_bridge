name: liquid_glass_bridge
description: Native-backed liquid glass, glassmorphism, and adaptive iOS/Android UI controls for Flutter.
version: 0.3.3
homepage: https://github.com/DrRaspec/liquid_glass_bridge
repository: https://github.com/DrRaspec/liquid_glass_bridge
issue_tracker: https://github.com/DrRaspec/liquid_glass_bridge/issues

topics:
  - liquid-glass
  - glassmorphism
  - flutter-ui
  - ios
  - android

environment:
  sdk: ^3.10.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: LiquidGlassBridgePlugin
      android:
        package: com.drraspec.liquid_glass_bridge
        pluginClass: LiquidGlassBridgePlugin
  assets:
    - assets/noise_64.png
  shaders:
    - shaders/liquid_lens.frag
